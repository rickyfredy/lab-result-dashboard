<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Lab Result Dashboard - Home')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/layout :: header(null)}"></nav>

<div class="container flex-grow-1">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body p-4 text-center">
                    <h2 class="card-title mb-3">
                        <i class="bi bi-clipboard2-pulse text-primary"></i>
                        Lab Result Dashboard
                    </h2>
                    <p class="text-muted mb-4">Select a patient to view their lab test results</p>

                    <div th:if="${patients != null and !patients.isEmpty()}">
                        <form method="get" action="/test-results" id="patientForm">
                            <div class="mb-3">
                                <select class="form-select form-select-lg" name="patientId" id="patientSelect"
                                        onchange="document.getElementById('patientForm').submit()">
                                    <option value="" selected disabled>-- Select Patient --</option>
                                    <option th:each="patient : ${patients}"
                                            th:value="${patient.id}"
                                            th:text="${patient.name}"></option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100">
                                <i class="bi bi-arrow-right-circle"></i> View Results
                            </button>
                        </form>
                    </div>
                    <div th:if="${patients == null or patients.isEmpty()}" class="alert alert-warning">
                        <i class="bi bi-exclamation-triangle"></i> No patients found in the database.
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
