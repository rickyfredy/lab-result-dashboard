<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Lab Result Dashboard - Test Results')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/layout :: header(${patientId})}"></nav>

<div class="container flex-grow-1">
    <input type="hidden" id="patientId" th:value="${patientId}"/>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3><i class="bi bi-person-fill text-primary"></i> <span th:text="${patient.name}">Patient</span></h3>
            <span class="text-muted">Test Results</span>
        </div>
        <a th:href="@{/historical(patientId=${patientId})}" class="btn btn-outline-primary">
            <i class="bi bi-graph-up"></i> View Historical
        </a>
    </div>

    <div th:if="${groups != null and !groups.isEmpty()}">
        <div class="card mb-4 shadow-sm" th:each="group, iter : ${groups}">
            <div class="card-header bg-light d-flex justify-content-between align-items-center">
                <h5 class="mb-0">
                    <i class="bi bi-folder2-open text-primary"></i>
                    <span th:text="${group.title}">Title</span>
                </h5>
                <span class="badge bg-primary rounded-pill" th:text="${group.totalCount + ' results'}">0 results</span>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Test Name</th>
                            <th>Result</th>
                            <th>Unit</th>
                            <th>Normal Range</th>
                            <th>Date</th>
                        </tr>
                        </thead>
                        <tbody th:id="'results-' + ${iter.index}">
                        <tr th:each="result : ${group.results}"
                            th:classappend="${result.isAbnormal} ? 'table-danger' : ''">
                            <td th:text="${result.testName}"></td>
                            <td>
                                <span th:text="${result.resultValue}"></span>
                                <i th:if="${result.isAbnormal}" class="bi bi-exclamation-triangle-fill text-danger ms-1"></i>
                            </td>
                            <td th:text="${result.resultUnit} ?: ''"></td>
                            <td th:text="${result.normalRange} ?: ''"></td>
                            <td th:text="${#temporals.format(result.testDate, 'yyyy-MM-dd HH:mm')}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="card-footer bg-white" th:if="${group.hasMore}">
                <div class="d-flex justify-content-between align-items-center">
                    <span class="text-muted small">
                        Showing <span th:id="'loaded-' + ${iter.index}" th:text="${group.loadedCount}">0</span>
                        of <span th:text="${group.totalCount}">0</span>
                    </span>
                    <button class="btn btn-sm btn-outline-primary btn-load-more"
                            th:data-title="${group.title}"
                            th:data-index="${iter.index}"
                            th:data-offset="${group.loadedCount}">
                        <i class="bi bi-three-dots"></i> Load More
                    </button>
                </div>
            </div>
            <div class="card-footer bg-white" th:unless="${group.hasMore}">
                <span class="text-muted small">All results loaded (<span th:text="${group.totalCount}">0</span>)</span>
            </div>
        </div>
    </div>

    <div th:if="${groups == null or groups.isEmpty()}" class="alert alert-info">
        <i class="bi bi-info-circle"></i> No test results found for this patient.
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const patientId = document.getElementById('patientId').value;

        document.querySelectorAll('.btn-load-more').forEach(function (btn) {
            btn.addEventListener('click', function () {
                const title = this.dataset.title;
                const index = this.dataset.index;
                const offset = parseInt(this.dataset.offset);
                const limit = 5;
                const tbody = document.getElementById('results-' + index);
                const loadedSpan = document.getElementById('loaded-' + index);
                const originalHtml = this.innerHTML;

                this.disabled = true;
                this.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Loading...';

                fetch('/api/test-results/more?patientId=' + encodeURIComponent(patientId) +
                    '&title=' + encodeURIComponent(title) +
                    '&offset=' + offset + '&limit=' + limit)
                    .then(function (r) { return r.json(); })
                    .then(function (data) {
                        data.results.forEach(function (result) {
                            const tr = document.createElement('tr');
                            if (result.isAbnormal) {
                                tr.className = 'table-danger';
                            }
                            const dateStr = formatDateTime(result.testDate);
                            tr.innerHTML =
                                '<td>' + escapeHtml(result.testName) + '</td>' +
                                '<td>' + escapeHtml(result.resultValue) +
                                (result.isAbnormal ? ' <i class="bi bi-exclamation-triangle-fill text-danger ms-1"></i>' : '') +
                                '</td>' +
                                '<td>' + escapeHtml(result.resultUnit || '') + '</td>' +
                                '<td>' + escapeHtml(result.normalRange || '') + '</td>' +
                                '<td>' + dateStr + '</td>';
                            tbody.appendChild(tr);
                        });

                        loadedSpan.textContent = data.loadedCount;

                        if (data.hasMore) {
                            btn.dataset.offset = data.loadedCount;
                            btn.disabled = false;
                            btn.innerHTML = originalHtml;
                        } else {
                            btn.parentElement.innerHTML =
                                '<span class="text-muted small">All results loaded (' + data.totalCount + ')</span>';
                        }
                    })
                    .catch(function (err) {
                        console.error('Error loading more results:', err);
                        btn.disabled = false;
                        btn.innerHTML = originalHtml;
                    });
            });
        });

        function formatDateTime(dt) {
            if (!dt) return '';
            if (Array.isArray(dt)) {
                var d = new Date(dt[0], (dt[1] || 1) - 1, dt[2] || 1, dt[3] || 0, dt[4] || 0, dt[5] || 0);
                return d.getFullYear() + '-' +
                    String(d.getMonth() + 1).padStart(2, '0') + '-' +
                    String(d.getDate()).padStart(2, '0') + ' ' +
                    String(d.getHours()).padStart(2, '0') + ':' +
                    String(d.getMinutes()).padStart(2, '0');
            }
            var d = new Date(dt);
            if (isNaN(d.getTime())) return dt;
            return d.getFullYear() + '-' +
                String(d.getMonth() + 1).padStart(2, '0') + '-' +
                String(d.getDate()).padStart(2, '0') + ' ' +
                String(d.getHours()).padStart(2, '0') + ':' +
                String(d.getMinutes()).padStart(2, '0');
        }

        function escapeHtml(str) {
            if (!str) return '';
            var div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    });
</script>
</body>
</html>
