<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Lab Result Dashboard - Historical')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/layout :: header(${patientId})}"></nav>

<div class="container flex-grow-1">
    <input type="hidden" id="patientId" th:value="${patientId}"/>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3><i class="bi bi-person-fill text-primary"></i> <span th:text="${patient.name}">Patient</span></h3>
            <span class="text-muted">Historical Results</span>
        </div>
        <a th:href="@{/test-results(patientId=${patientId})}" class="btn btn-outline-primary">
            <i class="bi bi-list-check"></i> View Test Results
        </a>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h5 class="card-title mb-3"><i class="bi bi-funnel-fill"></i> Filters</h5>
            <div class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label">Title</label>
                    <select class="form-select" id="titleSelect">
                        <option value="" selected disabled>-- Select Title --</option>
                        <option th:each="title : ${titles}" th:value="${title}" th:text="${title}"></option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Test Name</label>
                    <select class="form-select" id="testNameSelect" disabled>
                        <option value="" selected disabled>-- Select Test Name --</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Period</label>
                    <select class="form-select" id="periodSelect">
                        <option value="3m">Last 3 months</option>
                        <option value="6m">Last 6 months</option>
                        <option value="1y" selected>Last 1 year</option>
                        <option value="2y">Last 2 years</option>
                        <option value="3y">Last 3 years</option>
                        <option value="3y+">More than 3 years ago</option>
                    </select>
                </div>
                <div class="col-md-1">
                    <button class="btn btn-primary w-100" id="showChartBtn" disabled>
                        <i class="bi bi-graph-up"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div id="chartContainer" style="display:none;">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="mb-0" id="chartTitle"></h5>
                    <span class="badge bg-info text-dark" id="chartCount"></span>
                </div>
                <canvas id="historicalChart" style="max-height:400px;"></canvas>
                <div class="mt-3" id="chartLegend">
                    <span class="me-3"><i class="bi bi-circle-fill text-primary"></i> Normal</span>
                    <span class="me-3"><i class="bi bi-circle-fill text-danger"></i> Abnormal</span>
                    <span class="me-3"><i class="bi bi-dash-lg text-success"></i> Normal Range Min</span>
                    <span><i class="bi bi-dash-lg text-warning"></i> Normal Range Max</span>
                </div>
            </div>
            <div id="noDataMessage" class="text-center py-5 text-muted" style="display:none;">
                <i class="bi bi-graph-up" style="font-size:3rem;"></i>
                <p class="mt-3">No data available for the selected filters.</p>
            </div>
            <div id="placeholderMessage" class="text-center py-5 text-muted">
                <i class="bi bi-graph-up" style="font-size:3rem;"></i>
                <p class="mt-3">Select filters and click the chart button to view historical data.</p>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const patientId = document.getElementById('patientId').value;
        const titleSelect = document.getElementById('titleSelect');
        const testNameSelect = document.getElementById('testNameSelect');
        const periodSelect = document.getElementById('periodSelect');
        const showChartBtn = document.getElementById('showChartBtn');
        let chart = null;

        titleSelect.addEventListener('change', function () {
            const title = this.value;
            testNameSelect.innerHTML = '<option value="" selected disabled>-- Select Test Name --</option>';
            testNameSelect.disabled = true;
            showChartBtn.disabled = true;

            if (!title) return;

            fetch('/api/test-names?patientId=' + encodeURIComponent(patientId) +
                '&title=' + encodeURIComponent(title))
                .then(function (r) { return r.json(); })
                .then(function (names) {
                    names.forEach(function (name) {
                        const opt = document.createElement('option');
                        opt.value = name;
                        opt.textContent = name;
                        testNameSelect.appendChild(opt);
                    });
                    testNameSelect.disabled = false;
                })
                .catch(function (err) {
                    console.error('Error loading test names:', err);
                });
        });

        testNameSelect.addEventListener('change', function () {
            showChartBtn.disabled = !this.value;
        });

        showChartBtn.addEventListener('click', function () {
            const title = titleSelect.value;
            const testName = testNameSelect.value;
            const period = periodSelect.value;

            if (!title || !testName) return;

            this.disabled = true;
            this.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';

            fetch('/api/historical?patientId=' + encodeURIComponent(patientId) +
                '&title=' + encodeURIComponent(title) +
                '&testName=' + encodeURIComponent(testName) +
                '&period=' + encodeURIComponent(period))
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    renderChart(data);
                })
                .catch(function (err) {
                    console.error('Error loading historical data:', err);
                })
                .finally(function () {
                    showChartBtn.disabled = false;
                    showChartBtn.innerHTML = '<i class="bi bi-graph-up"></i>';
                });
        });

        function renderChart(data) {
            document.getElementById('placeholderMessage').style.display = 'none';

            if (!data.values || data.values.length === 0) {
                document.getElementById('chartContainer').style.display = 'none';
                document.getElementById('noDataMessage').style.display = 'block';
                return;
            }

            document.getElementById('noDataMessage').style.display = 'none';
            document.getElementById('chartContainer').style.display = 'block';

            var unitText = data.unit ? ' (' + data.unit + ')' : '';
            document.getElementById('chartTitle').textContent = data.testName + unitText;
            document.getElementById('chartCount').textContent = data.totalCount + ' data points';

            var pointColors = data.abnormalFlags.map(function (f) {
                return f === 'abnormal' ? '#dc3545' : '#0d6efd';
            });

            var datasets = [{
                label: data.testName,
                data: data.values,
                borderColor: '#0d6efd',
                backgroundColor: 'rgba(13, 110, 253, 0.1)',
                fill: false,
                tension: 0.1,
                pointBackgroundColor: pointColors,
                pointBorderColor: pointColors,
                pointRadius: 5,
                pointHoverRadius: 7
            }];

            if (data.normalRangeMin != null) {
                datasets.push({
                    label: 'Normal Min (' + data.normalRangeMin + ')',
                    data: data.values.map(function () { return data.normalRangeMin; }),
                    borderColor: '#198754',
                    borderDash: [6, 4],
                    fill: false,
                    pointRadius: 0,
                    borderWidth: 2
                });
            }

            if (data.normalRangeMax != null) {
                datasets.push({
                    label: 'Normal Max (' + data.normalRangeMax + ')',
                    data: data.values.map(function () { return data.normalRangeMax; }),
                    borderColor: '#ffc107',
                    borderDash: [6, 4],
                    fill: false,
                    pointRadius: 0,
                    borderWidth: 2
                });
            }

            if (chart) {
                chart.destroy();
            }

            var ctx = document.getElementById('historicalChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.labels,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    scales: {
                        x: {
                            title: { display: true, text: 'Test Date' },
                            ticks: { maxRotation: 45, minRotation: 45 }
                        },
                        y: {
                            title: { display: true, text: data.unit || 'Value' },
                            beginAtZero: false
                        }
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                afterBody: function (context) {
                                    var idx = context[0].dataIndex;
                                    if (data.abnormalFlags[idx] === 'abnormal') {
                                        return 'Status: Abnormal';
                                    }
                                    return 'Status: Normal';
                                }
                            }
                        }
                    }
                }
            });
        }
    });
</script>
</body>
</html>
