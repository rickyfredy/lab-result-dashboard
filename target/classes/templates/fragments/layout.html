<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title}">Lab Result Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<nav th:fragment="header(patientId)" class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-clipboard2-pulse-fill"></i> Lab Result Dashboard
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto" th:if="${patientId != null}">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/test-results(patientId=${patientId})}">
                        <i class="bi bi-list-check"></i> Test Results
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/historical(patientId=${patientId})}">
                        <i class="bi bi-graph-up"></i> Historical
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<footer th:fragment="footer" class="footer mt-auto py-3 bg-light border-top">
    <div class="container text-center text-muted small">
        Lab Result Dashboard &copy; 2026
    </div>
</footer>
</body>
</html>
